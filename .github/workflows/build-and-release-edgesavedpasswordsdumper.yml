name: Build and Release EdgeSavedPasswordsDumper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # REQUIRED to push tags + create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # make sure tags/history are available

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.0.2

      # If manually triggered, create and push a timestamp tag like v20260505084655
      - name: Create timestamp tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $tag = "v" + (Get-Date -Format "yyyyMMddHHmmss")
          echo "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag $tag
          git push origin $tag

      # If this is a push tag event, use the existing tag name
      - name: Set tag from ref (push tags only)
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          echo "TAG_NAME=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Solution
        run: |
          msbuild EdgeSavedPasswordsDumper/EdgeSavedPasswordsDumper.sln /p:Configuration=Release

      - name: Zip the Executable
        shell: pwsh
        run: |
          Compress-Archive `
            -Path EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper.exe `
            -DestinationPath EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper.exe.zip `
            -Force

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper.exe
            EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper.exe.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
