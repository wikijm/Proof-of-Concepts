name: Build and Release EdgeSavedPasswordsDumper

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      - name: Setup .NET 6 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      # Create timestamp tag when manually triggered
      - name: Create timestamp tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        run: |
          $tag = "v" + (Get-Date -Format "yyyyMMddHHmmss")
          "TAG_NAME=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $tag
          git push origin $tag

      # Use pushed tag when triggered by tag push
      - name: Set tag from ref (push tags only)
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          "TAG_NAME=${{ github.ref_name }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build (.NET 3.5)
        run: |
          msbuild EdgeSavedPasswordsDumper/EdgeSavedPasswordsDumper.sln `
            /p:Configuration=Release

      # Publish self-contained .NET 6 win-x64
      - name: Publish (.NET 6 self-contained win-x64)
        shell: pwsh
        run: |
          dotnet publish EdgeSavedPasswordsDumper/EdgeSavedPasswordsDumper.Net6.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            /p:PublishSingleFile=true `
            /p:PublishTrimmed=false `
            /p:EnableDefaultCompileItems=false `
            /p:GenerateAssemblyInfo=false

      - name: Zip executables
        shell: pwsh
        run: |
          Compress-Archive `
            -Path EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper.exe `
            -DestinationPath EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper-net35.exe.zip `
            -Force

          Compress-Archive `
            -Path EdgeSavedPasswordsDumper/bin/Release/net6.0-windows/win-x64/publish/* `
            -DestinationPath EdgeSavedPasswordsDumper/bin/Release/net6.0-windows/EdgeSavedPasswordsDumper-net6-win-x64-selfcontained.zip `
            -Force

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper.exe
            EdgeSavedPasswordsDumper/bin/Release/EdgeSavedPasswordsDumper-net35.exe.zip
            EdgeSavedPasswordsDumper/bin/Release/net6.0-windows/EdgeSavedPasswordsDumper-net6-win-x64-selfcontained.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
